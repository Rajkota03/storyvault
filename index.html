<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Vault v2</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-deep: #0c0e12;
            --bg-surface: #161a1f;
            --bg-card: #1c2128;
            --bg-input: #0a0c0f;

            --accent-gold: #d4af37;
            --accent-orange: #ff8c42;
            --accent-blue: #4facfe;
            --accent-red: #ff4d4d;
            --accent-green: #2ecc71;

            --text-primary: #e6e9ee;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --border: #2d3748;
            --shadow-glow: 0 0 20px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/dark-leather.png");
        }

        /* --- Layout --- */
        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding-bottom: calc(70px + var(--safe-bottom));
            overflow-y: auto;
            background: transparent;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Typography --- */
        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif;
        }

        .label-style {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        /* --- Components --- */
        header {
            padding: 1.5rem 1.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-title {
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        .icon-btn:hover {
            color: var(--accent-gold);
        }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 1.5rem;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .tab {
            padding: 0.75rem 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            white-space: nowrap;
        }

        .tab.active {
            color: var(--accent-gold);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
        }

        /* Idea Card */
        .card-list {
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .idea-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .idea-card:hover {
            border-color: var(--text-muted);
            transform: scale(1.02);
        }

        .card-thumb {
            width: 80px;
            height: 100px;
            background: #232931;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1.15rem;
            margin-bottom: 0.4rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 0.5rem;
        }

        .status-raw {
            background: rgba(255, 140, 66, 0.1);
            color: var(--accent-orange);
            border: 1px solid rgba(255, 140, 66, 0.2);
        }

        .status-developing {
            background: rgba(255, 77, 77, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .status-ready {
            background: rgba(46, 204, 113, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .status-shelved {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .card-logline {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 0.5rem;
            line-height: 1.4;
        }

        .card-accent {
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            border-radius: 0 4px 4px 0;
        }

        /* --- Detail View --- */
        .detail-header {
            padding: 1.5rem;
            position: sticky;
            top: 0;
            background: var(--bg-deep);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .detail-body {
            padding: 0 1.5rem;
        }

        .detail-title {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: var(--accent-gold);
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-text {
            line-height: 1.6;
            color: var(--text-primary);
            font-size: 1rem;
            white-space: pre-wrap;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        /* --- Industrial Accordion --- */
        .accordion {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.01);
            transition: var(--transition);
        }

        .accordion-header {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            user-select: none;
        }

        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .accordion-title-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .accordion-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 5px var(--text-muted);
            transition: var(--transition);
        }

        .accordion.expanded .accordion-indicator {
            background: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% {
                opacity: 0.4;
                transform: scale(0.9);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 0.4;
                transform: scale(0.9);
            }
        }

        .accordion-chevron {
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .accordion.expanded .accordion-chevron {
            transform: rotate(180deg);
            color: var(--accent-gold);
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
            padding: 0 1.25rem;
        }

        .accordion.expanded .accordion-content {
            grid-template-rows: 1fr;
            padding: 0 1.25rem 1.25rem;
        }

        .accordion-inner {
            overflow: hidden;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* --- Forms --- */
        .form-screen {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn-save {
            background: linear-gradient(to right, #e63946, #d62828);
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: 12px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.3);
            margin-top: 1rem;
        }

        /* --- Genres --- */
        .genre-list {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .genre-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .genre-item:hover {
            border-color: var(--accent-gold);
        }

        /* --- Loading and Sync --- */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 14, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--accent-gold);
            font-family: 'Playfair Display', serif;
        }

        .loading-overlay.active {
            display: flex;
        }

        .sync-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: black;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 10000;
            /* Much higher */
            display: none;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.4);
            cursor: pointer;
            width: max-content;
            border: 2px solid white;
        }

        .genre-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 1rem;
        }

        /* --- Bottom Nav --- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(70px + var(--safe-bottom));
            background: rgba(22, 26, 31, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            text-decoration: none;
            gap: 4px;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent-gold);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .add-circle {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 15px rgba(255, 95, 109, 0.4);
            transform: translateY(-15px);
        }

        /* --- Search Bar --- */
        .search-container {
            padding: 1.5rem;
            position: sticky;
            top: 0;
            background: var(--bg-deep);
            z-index: 5;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper svg {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
        }

        .search-input-wrapper input {
            padding-left: 3rem;
        }

        /* --- Empty State --- */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .btn-empty {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Utilities --- */
        .dot-thriller {
            background-color: var(--accent-green);
        }

        .dot-comedy {
            background-color: var(--accent-gold);
        }

        .dot-drama {
            background-color: var(--accent-orange);
        }

        .dot-horror {
            background-color: var(--accent-red);
        }

        .dot-romance {
            background-color: #ff69b4;
        }

        .dot-scifi {
            background-color: var(--accent-blue);
        }

        .dot-action {
            background-color: #2c3e50;
        }

        .dot-mystery {
            background-color: #8e44ad;
        }

        .dot-other {
            background-color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="accordion-indicator"
            style="width: 24px; height: 24px; margin-bottom: 20px; background: var(--accent-gold); box-shadow: 0 0 20px var(--accent-gold); animation: pulse-glow 1s infinite;">
        </div>
        <div style="font-size: 1.5rem;">Accessing Vault...</div>
    </div>

    <div id="sync-toast" class="sync-toast" onclick="app.syncLocalToCloud()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        Cloud Sync Required (Local Data Found)
    </div>

    <div id="app">
        <!-- Screen: Home -->
        <div id="screen-home" class="screen active">
            <header>
                <div class="brand-title">Story Vault</div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="icon-btn" onclick="router.navigate('search')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                    <button class="icon-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="tabs" id="status-tabs">
                <div class="tab active" data-status="all">All</div>
                <div class="tab" data-status="Raw">Raw</div>
                <div class="tab" data-status="Developing">Developing</div>
                <div class="tab" data-status="Ready">Ready</div>
                <div class="tab" data-status="Shelved">Shelved</div>
            </div>

            <div class="card-list" id="home-card-list">
                <!-- Cards Rendered Here -->
            </div>
        </div>

        <!-- Screen: Add/Edit -->
        <div id="screen-form" class="screen">
            <div class="detail-header">
                <button class="icon-btn" onclick="router.back()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <h2 id="form-header-title">Add New Idea</h2>
            </div>
            <div class="form-screen">
                <div class="form-group">
                    <div class="label-style">Title</div>
                    <input type="text" id="input-title" placeholder="A brief, catchy title...">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <div class="label-style">Genre</div>
                        <select id="input-genre">
                            <option value="Thriller">Thriller</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Drama">Drama</option>
                            <option value="Horror">Horror</option>
                            <option value="Romance">Romance</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Action">Action</option>
                            <option value="Mystery">Mystery</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <div class="label-style">Status</div>
                        <select id="input-status">
                            <option value="Raw">Raw Seed</option>
                            <option value="Developing">Developing</option>
                            <option value="Ready">Ready</option>
                            <option value="Shelved">Shelved</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <div class="label-style">Logline</div>
                    <textarea id="input-logline" placeholder="One sentence summary..."></textarea>
                </div>
                <div class="form-group">
                    <div class="label-style">Full Concept</div>
                    <textarea id="input-concept" style="min-height: 200px;"
                        placeholder="Expanded story mechanics, beats, and ending..."></textarea>
                </div>
                <button class="btn-save" onclick="app.saveIdea()">Save in Vault</button>
            </div>
        </div>

        <!-- Screen: View Detail -->
        <div id="screen-detail" class="screen">
            <div class="detail-header">
                <button class="icon-btn" onclick="router.back()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div style="flex: 1"></div>
                <button class="icon-btn" id="btn-edit-current">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
                <button class="icon-btn" id="btn-delete-current" style="color: var(--accent-red)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
            <div class="detail-body" id="detail-body-content">
                <!-- Dynamic Content Segregated by Steps -->
            </div>
        </div>

        <!-- Screen: Genres -->
        <div id="screen-genres" class="screen">
            <header>
                <h2 class="brand-title">Genres</h2>
            </header>
            <div class="genre-list" id="genre-screen-list">
                <!-- Genre items rendered here -->
            </div>
        </div>

        <!-- Screen: Search -->
        <div id="screen-search" class="screen">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input-field" placeholder="Search by name, logline..."
                        oninput="app.performSearch()">
                </div>
            </div>
            <div class="card-list" id="search-result-list">
                <!-- Search results rendered here -->
            </div>
        </div>

        <!-- Persistent Bottom Nav -->
        <nav>
            <div class="nav-item active" onclick="router.navigate('home')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Status</span>
            </div>
            <div class="nav-item" onclick="router.navigate('genres')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span>Genres</span>
            </div>
            <div class="nav-item" onclick="app.openCreate()">
                <div class="add-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </div>
            </div>
            <div class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>AI</span>
            </div>
            <div class="nav-item" onclick="router.navigate('search')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span>Search</span>
            </div>
        </nav>
    </div>

    <script>
        // --- Configuration ---
        const SUPABASE_URL = 'https://bkueqfbxubtkgiuwakrz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrdWVxZmJ4dWJ0a2dpdXdha3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDcwNDIsImV4cCI6MjA4NzkyMzA0Mn0.yiVK28lZd553xMVSp-xwDypVmzj8t7v-96LjFongi78';
        const STORAGE_KEY = 'story_vault_v2_data';
        const GENRES = ['Thriller', 'Comedy', 'Drama', 'Horror', 'Romance', 'Sci-Fi', 'Action', 'Mystery', 'Other'];
        const STATUSES = ['Raw', 'Developing', 'Ready', 'Shelved'];

        // Lazy-loaded Supabase client
        let _supabase = null;
        function getSupabase() {
            if (_supabase) return _supabase;
            if (window.supabase) {
                console.log('Story Vault: Initializing Cloud Client...');
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                return _supabase;
            }
            console.error('Story Vault: Supabase Library not found!');
            return null;
        }

        // --- Router ---
        const router = {
            history: ['home'],
            current: 'home',

            navigate(screenId, direction = 'forward') {
                const screens = document.querySelectorAll('.screen');
                screens.forEach(s => s.classList.remove('active'));

                const target = document.getElementById(`screen-${screenId}`);
                if (target) {
                    target.classList.add('active');
                    if (direction === 'forward') this.history.push(screenId);
                    this.current = screenId;
                    this.updateNav();
                    window.scrollTo(0, 0);

                    // Trigger screen-specific data refresh
                    if (screenId === 'home') app.renderHome();
                    if (screenId === 'genres') app.renderGenres();
                }
            },

            back() {
                if (this.history.length > 1) {
                    this.history.pop();
                    const prev = this.history[this.history.length - 1];
                    this.navigate(prev, 'back');
                    this.history.pop(); // Since navigate pushes it back
                }
            },

            updateNav() {
                const navItems = document.querySelectorAll('.nav-item');
                navItems.forEach(item => {
                    const text = item.querySelector('span')?.textContent.toLowerCase();
                    item.classList.remove('active');
                    if (this.current === 'home' && text === 'status') item.classList.add('active');
                    if (this.current === 'genres' && text === 'genres') item.classList.add('active');
                    if (this.current === 'search' && text === 'search') item.classList.add('active');
                });
            }
        };

        // --- Core App ---
        const app = {
            ideas: [],
            filter: 'all',
            editingId: null,

            async init() {
                this.setupListeners();
                await this.load();
                this.checkLocalSync();
                this.renderHome();
            },

            setLoading(active) {
                document.getElementById('loading-overlay').classList.toggle('active', active);
            },

            async load() {
                const client = getSupabase();
                if (!client) {
                    console.warn('Story Vault: Cloud client not ready. Using local fallback.');
                    const localData = localStorage.getItem(STORAGE_KEY);
                    this.ideas = localData ? JSON.parse(localData) : [];
                    return;
                }

                this.setLoading(true);
                try {
                    console.log('Story Vault: Fetching records from cloud...');
                    const { data, error } = await client
                        .from('stories')
                        .select('*')
                        .order('updated_at', { ascending: false });

                    if (error) throw error;
                    this.ideas = data || [];
                    console.log(`Story Vault: ${this.ideas.length} records retrieved from cloud.`);
                } catch (err) {
                    console.error('Vault Access Error:', err);
                    const localData = localStorage.getItem(STORAGE_KEY);
                    this.ideas = localData ? JSON.parse(localData) : [];
                } finally {
                    this.setLoading(false);
                }
            },

            checkLocalSync() {
                const localData = localStorage.getItem(STORAGE_KEY);
                if (localData) {
                    const parsed = JSON.parse(localData);
                    if (parsed.length > 0) {
                        console.log('Story Vault: Local records found. Displaying Cloud Sync prompt.');
                        document.getElementById('sync-toast').style.display = 'flex';
                    }
                }
            },

            async syncLocalToCloud() {
                const client = getSupabase();
                if (!client) return alert('Cloud connection not established. Please check your internet or wait a moment.');

                const localData = localStorage.getItem(STORAGE_KEY);
                if (!localData) return;

                const ideas = JSON.parse(localData);
                this.setLoading(true);

                try {
                    console.log(`Story Vault: Starting migration of ${ideas.length} records...`);
                    const toSync = ideas.map(i => ({
                        title: i.title,
                        genre: i.genre,
                        status: i.status || 'Raw',
                        logline: i.logline,
                        concept: i.concept,
                        sections: i.sections || {},
                        updated_at: new Date(i.updatedAt || Date.now()).toISOString()
                    }));

                    const { error } = await client.from('stories').insert(toSync);
                    if (error) throw error;

                    console.log('Story Vault: Migration successful. Clearing local storage.');
                    localStorage.removeItem(STORAGE_KEY);
                    document.getElementById('sync-toast').style.display = 'none';
                    await this.load();
                    this.renderHome();
                    alert('Vault synchronization complete. Your ideas are now secure in the cloud.');
                } catch (err) {
                    console.error('Migration failed:', err);
                    alert('Sync failed: ' + err.message);
                } finally {
                    this.setLoading(false);
                }
            },

            setupListeners() {
                // Status Tab Filtering
                document.getElementById('status-tabs').addEventListener('click', (e) => {
                    const tab = e.target.closest('.tab');
                    if (!tab) return;

                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    this.filter = tab.dataset.status;
                    this.renderHome();
                });
            },

            // --- Render Logic ---

            renderHome() {
                const list = document.getElementById('home-card-list');
                const filtered = this.filter === 'all'
                    ? this.ideas
                    : this.ideas.filter(i => i.status === this.filter);

                if (filtered.length === 0) {
                    list.innerHTML = this.getEmptyStateUI();
                    return;
                }

                list.innerHTML = filtered.map(i => this.getCardHTML(i)).join('');
            },

            renderGenres() {
                const list = document.getElementById('genre-screen-list');
                list.innerHTML = GENRES.map(g => {
                    const count = this.ideas.filter(i => i.genre === g).length;
                    return `
                    <div class="genre-item" onclick="app.showGenreSearch('${g}')">
                        <div style="display: flex; align-items: center;">
                            <div class="genre-dot dot-${g.toLowerCase()}"></div>
                            <span style="font-weight: 600;">${g}</span>
                        </div>
                        <span style="color: var(--text-muted); font-weight: 700;">${count}</span>
                    </div>
                `;
                }).join('');
            },

            getCardHTML(idea) {
                const statusClass = `status-${idea.status.toLowerCase()}`;
                const accentColor = idea.status === 'Raw' ? 'var(--accent-orange)' :
                    idea.status === 'Ready' ? 'var(--accent-green)' :
                        idea.status === 'Developing' ? 'var(--accent-red)' : 'var(--text-muted)';

                // Priority logline for card
                const displayLogline = (idea.sections && idea.sections.logline) || idea.logline || 'Brainstorming stage...';

                return `
                <div class="idea-card" onclick="app.openDetail('${idea.id}')">
                    <div class="card-accent" style="background: ${accentColor}; box-shadow: 0 0 10px ${accentColor}"></div>
                    <div class="card-thumb">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </div>
                    <div class="card-content">
                        <div style="display: flex; align-items: center; margin-bottom: 2px;">
                            <span class="status-pill status-shelved" style="font-size: 0.6rem; padding: 1px 4px;">${idea.genre}</span>
                            <span class="status-pill ${statusClass}" style="font-size: 0.6rem; padding: 1px 4px;">${idea.status}</span>
                        </div>
                        <div class="card-title">${this.escape(idea.title)}</div>
                        <div class="card-logline">${this.escape(displayLogline)}</div>
                    </div>
                </div>
            `;
            },

            getEmptyStateUI() {
                return `
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <h2>Your Story Vault is Empty</h2>
                    <p>Capture your first idea and secure it within the vault encryption.</p>
                    <button class="btn-empty" onclick="app.openCreate()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Idea
                    </button>
                </div>
            `;
            },

            // --- Navigation Actions ---

            openCreate() {
                this.editingId = null;
                document.getElementById('form-header-title').textContent = 'New Idea';
                document.getElementById('input-title').value = '';
                document.getElementById('input-genre').value = 'Thriller';
                document.getElementById('input-status').value = 'Raw';
                document.getElementById('input-logline').value = '';
                document.getElementById('input-concept').value = '';
                router.navigate('form');
            },

            openDetail(id) {
                const idea = this.ideas.find(i => i.id === id);
                if (!idea) return;

                const container = document.getElementById('detail-body-content');
                const s = idea.sections || {};

                let html = `
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <span class="status-pill status-${idea.status.toLowerCase()}">${idea.status}</span>
                        <span class="status-pill status-shelved">${idea.genre}</span>
                    </div>
                    <h1 class="detail-title">${this.escape(idea.title)}</h1>
                `;

                // Helper for expanded sections
                const addExpanded = (label, content, fallback) => {
                    const text = content || fallback;
                    if (!text) return '';
                    return `
                        <div class="detail-section">
                            <div class="label-style">${label}</div>
                            <div class="detail-text">${this.escape(text)}</div>
                        </div>
                    `;
                };

                // Helper for collapsible sections
                const addCollapsible = (label, content, key) => {
                    if (!content) return '';
                    return `
                        <div class="accordion" id="accordion-${key}">
                            <div class="accordion-header" onclick="app.toggleSection('${key}')">
                                <div class="accordion-title-group">
                                    <div class="accordion-indicator"></div>
                                    <div class="label-style" style="margin-bottom: 0;">${label}</div>
                                </div>
                                <svg class="accordion-chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </div>
                            <div class="accordion-content">
                                <div class="accordion-inner">
                                    <div style="padding-top: 1rem; white-space: pre-wrap;">${this.escape(content)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                };

                // HYBRID FOCUS ORDER: 
                // 1. Logline (Always expanded)
                // 2. 3-Act (Always expanded)
                // 3. Fusion Sources (Collapsible)
                // 4. Fusion Logic (Collapsible)
                // 5. Core Architecture (Collapsible)

                html += addExpanded('High-Concept Logline', s.logline, idea.logline);

                // Technical Data Group
                if (s.three_act || s.sources || s.logic || s.architecture) {
                    html += `<div style="margin-top: 2.5rem; margin-bottom: 1rem;" class="label-style">Technical Data / Vault Logs</div>`;
                }

                html += addCollapsible('Structure', s.three_act, 'structure');
                html += addCollapsible('Fusion Sources', s.sources, 'sources');
                html += addCollapsible('Fusion Logic', s.logic, 'logic');
                html += addCollapsible('Core Architecture', s.architecture, 'architecture');

                // If no structured sections, show raw concept
                if (!idea.sections || Object.keys(idea.sections).length === 0) {
                    html += addExpanded('Full Concept', idea.concept, null);
                }

                container.innerHTML = html;

                document.getElementById('btn-edit-current').onclick = () => {
                    console.log(`Story Vault: ID ${id} triggered for Edit.`);
                    this.openEdit(id);
                };

                document.getElementById('btn-delete-current').onclick = () => {
                    console.log(`Story Vault: ID ${id} triggered for Delete.`);
                    this.deleteIdea(id);
                };

                router.navigate('detail');
            },

            toggleSection(key) {
                const el = document.getElementById(`accordion-${key}`);
                if (el) {
                    el.classList.toggle('expanded');
                }
            },

            openEdit(id) {
                const idea = this.ideas.find(i => i.id === id);
                if (!idea) return;

                this.editingId = id;
                document.getElementById('form-header-title').textContent = 'Edit Project';
                document.getElementById('input-title').value = idea.title;
                document.getElementById('input-genre').value = idea.genre;
                document.getElementById('input-status').value = idea.status;
                document.getElementById('input-logline').value = idea.logline;
                document.getElementById('input-concept').value = idea.concept;
                router.navigate('form');
            },

            // --- Data Actions ---

            parseFusionContent(text) {
                const sections = {};
                const stepMarkers = [
                    { key: 'sources', pattern: /STEP 1\s*[—\-]?\s*Fusion Sources/i },
                    { key: 'logic', pattern: /STEP 2\s*[—\-]?\s*Fusion Logic/i },
                    { key: 'logline', pattern: /STEP 3\s*[—\-]?\s*High-Concept Logline/i },
                    { key: 'three_act', pattern: /STEP 4\s*[—\-]?\s*3-Act Structure/i },
                    { key: 'architecture', pattern: /STEP 5\s*[—\-]?\s*Core Architecture/i }
                ];

                // Split by Step markers
                const parts = text.split(/STEP [1-5]/i);
                const markers = text.match(/STEP [1-5]/gi) || [];

                // Extract working title if present
                const titleMatch = text.match(/Working Title:\s*(.*?)(\n|$)/i);
                const workingTitle = titleMatch ? titleMatch[1].replace(/["']/g, '').trim() : null;

                markers.forEach((marker, i) => {
                    const content = parts[i + 1]?.trim();
                    if (!content) return;

                    // Match marker to key
                    const headerLineMatch = text.match(new RegExp(marker + ".*?(?=\\n|$)", "i"));
                    const headerLine = headerLineMatch ? headerLineMatch[0] : "";

                    stepMarkers.forEach(sm => {
                        if (sm.pattern.test(headerLine)) {
                            sections[sm.key] = content;
                        }
                    });
                });

                return { sections, workingTitle };
            },

            async saveIdea() {
                let title = document.getElementById('input-title').value.trim();
                const concept = document.getElementById('input-concept').value.trim();

                const { sections, workingTitle } = this.parseFusionContent(concept);

                if (!title && workingTitle) title = workingTitle;
                if (!title) return alert('An idea needs a title before it can be vaulted.');

                const data = {
                    title: title,
                    genre: document.getElementById('input-genre').value,
                    status: document.getElementById('input-status').value,
                    logline: document.getElementById('input-logline').value,
                    concept: concept,
                    sections: sections,
                    updated_at: new Date().toISOString()
                };

                const client = getSupabase();
                if (!client) return alert('Cloud connection not established. Saving locally is disabled for cloud-mode.');

                this.setLoading(true);
                try {
                    console.log('Story Vault: Saving record...');
                    if (this.editingId) {
                        const { error } = await client
                            .from('stories')
                            .update(data)
                            .eq('id', this.editingId);
                        if (error) throw error;
                    } else {
                        const { error } = await client
                            .from('stories')
                            .insert([data]);
                        if (error) throw error;
                    }

                    console.log('Story Vault: Save successful.');
                    await this.load();
                    router.navigate('home', 'back');
                } catch (err) {
                    console.error('Save error:', err);
                    alert('Failed to save in vault: ' + err.message);
                } finally {
                    this.setLoading(false);
                }
            },

            async deleteIdea(id) {
                if (confirm('Permanently wipe this entry from the vault? This cannot be undone.')) {
                    const client = getSupabase();
                    if (!client) return alert('Cloud connection not established.');

                    this.setLoading(true);
                    try {
                        console.log(`Story Vault: Erasing record ${id}...`);
                        const { error } = await client
                            .from('stories')
                            .delete()
                            .eq('id', id);
                        if (error) throw error;

                        console.log('Story Vault: Erase successful.');
                        await this.load();
                        router.navigate('home', 'back');
                    } catch (err) {
                        console.error('Delete error:', err);
                        alert('Erase failed: ' + err.message);
                    } finally {
                        this.setLoading(false);
                    }
                }
            },

            performSearch() {
                const q = document.getElementById('search-input-field').value.toLowerCase();
                const list = document.getElementById('search-result-list');

                if (!q) {
                    list.innerHTML = '<div class="empty-state"><p>Start typing to search your vault...</p></div>';
                    return;
                }

                const results = this.ideas.filter(i =>
                    i.title.toLowerCase().includes(q) ||
                    (i.logline && i.logline.toLowerCase().includes(q)) ||
                    (i.sections?.logline && i.sections.logline.toLowerCase().includes(q)) ||
                    i.genre.toLowerCase().includes(q)
                );

                if (results.length === 0) {
                    list.innerHTML = '<div class="empty-state"><p>No encryption matches found.</p></div>';
                    return;
                }

                list.innerHTML = results.map(i => this.getCardHTML(i)).join('');
            },

            showGenreSearch(genre) {
                router.navigate('search');
                document.getElementById('search-input-field').value = genre;
                this.performSearch();
            },

            escape(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        };

        // --- Init ---
        app.init();

    </script>
